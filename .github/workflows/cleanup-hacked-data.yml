name: Cleanup Hacked Leaderboard Data

on:
  workflow_dispatch: # Allows manual trigger from GitHub Actions UI
  schedule:
    # Run daily at 2 AM UTC (optional - remove if you only want manual trigger)
    - cron: '0 2 * * *'

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Run cleanup script
        working-directory: server
        run: npm run cleanup:hacked
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_ENV: production

      - name: Notify completion
        if: success()
        run: echo "✅ Cleanup completed successfully!"

      - name: Notify failure
        if: failure()
        run: echo "❌ Cleanup failed. Check logs for details."
